<body>


<nav class="navbar navbar-expand-lg navbar-dark fixed-top">

<div class="content">
<div class="glass-box">

<img src="https://cdn-icons-png.flaticon.com/512/684/684908.png" width="100">

<h1>Welcome to <span style="color:yellow;">Sakay</span> Fare Guide!</h1>
<p>Compute your transportation fare easily and quickly.</p>

<hr>

<h4>Pick-Up Station (KM Marker)</h4>
<input type="number" id="pickup" class="form-control mb-3">

<h4>Drop-Off Station (KM Marker)</h4>
<input type="number" id="dropoff" class="form-control mb-3">

<div class="form-check mb-3">
<input class="form-check-input" type="checkbox" id="disc">
<label class="form-check-label">Apply Student Discount (20%)</label>
</div>

<button class="btn btn-warning" onclick="calculateFare()">Compute Fare</button>

<h3 class="mt-4">Fare: ₱<span id="DisplayAns">0.00</span></h3>

</div>

<div class="footer">
Caagbay & Tabasan | 9-R
</div>
</div>

<script>


function calculateFare() {

let pickup, dropoff, basefare, baseKM, perKMrate, distance, extraKM, discount;

pickup = parseFloat(document.getElementById("pickup").value);
dropoff = parseFloat(document.getElementById("dropoff").value);

basefare = 50;
perKMrate = 15;
baseKM = 2;

discount = document.getElementById("disc").checked;


distance = Math.max(Math.abs(dropoff - pickup), 0);


extraKM = Math.max(distance - baseKM, 0);


let fare = basefare + extraKM * perKMrate;


fare = fare * (1 - 0.2 * discount);


document.getElementById("DisplayAns").innerHTML = fare.toFixed(2);

}

</script>
